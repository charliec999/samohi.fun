function formatDate(date) {
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const d = new Date(date);
    return `${months[d.getMonth()]} ${d.getDate()} (${d.getFullYear().toString().slice(2)})`;
}

function formatCurrency(amount) {
    return `${amount.toFixed(2)} FunBucks`;
}

function calculatePriceChange24h(market) {
    const last24h = market.priceHistory
        .filter(p => p.date >= new Date(Date.now() - 24 * 60 * 60 * 1000))
        .map(p => p.price);
    if (last24h.length < 2) return 0;
    const previousPrice = last24h[0];
    const currentPrice = market.currentPrice;
    return ((currentPrice - previousPrice) / previousPrice) * 100;
}


class UserDataStore {
    constructor() {
        this.db = null;
        this.init();
    }

    async init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(db.name, db.version);

            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                this.db = request.result;
                resolve();
            };

            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(db.store)) {
                    db.createObjectStore(db.store, { keyPath: 'userId' });
                }
            };
        });
    }

    async saveUserData(userId, data) {
        if (!this.db) await this.init();
        
        return new Promise((resolve, reject) => {
            const transaction = this.db.transaction([db.store], 'readwrite');
            const store = transaction.objectStore(db.store);
            
            const request = store.put({
                userId,
                ...data,
                lastUpdated: new Date()
            });

            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async getUserData(userId) {
        if (!this.db) await this.init();

        return new Promise((resolve, reject) => {
            const transaction = this.db.transaction([db.store], 'readonly');
            const store = transaction.objectStore(db.store);
            const request = store.get(userId);

            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
}
const userDataStore = new UserDataStore();

        console.error('Error updating user data:', error);
        throw error;
    }
}



function calculateBetValue(bet) {
    const market = sampleMarkets.find(m => m.id === bet.marketId);
    if (!market) return { currentValue: 0, potentialPayout: 0, priceChange24h: 0 };

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const currentValue = bet.shares * currentPrice;
    const potentialPayout = bet.shares;
    const priceChange24h = calculatePriceChange24h(market);

    return {
        currentValue,
        potentialPayout,
        priceChange24h,
        priceChange: ((currentPrice - bet.entryPrice) / bet.entryPrice) * 100
    };
}

function showConfirmation(market, amount, position, shares) {
    const confirmation = document.createElement('div');
    confirmation.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';

    document.body.appendChild(confirmation);
    confirmation.querySelector('button').onclick = () => {

function showBettingModal(marketId, position) {
    const market = sampleMarkets.find(m => m.id === marketId);
    if (!market) return;

    const modal = document.getElementById('betting-modal');
    const marketInfo = document.getElementById('modal-market-info');
    const betAmount = document.getElementById('bet-amount');
    const betDetails = document.getElementById('bet-details');
    const price = position === 'yes' ? market.currentPrice : (1 - market.currentPrice);

    function updateBetDetails() {
        const amount = parseFloat(betAmount.value) || 0;
        const shares = amount / price;
        const potentialPayout = shares;

        betDetails.innerHTML = `
            <div>Shares: ${shares.toFixed(2)}</div>
            <div>Cost: ${formatCurrency(amount)}</div>
            <div>Potential Payout: ${formatCurrency(potentialPayout)}</div>
        `;
    }

    const onConfirmBet = async () => {
    const amount = parseFloat(betAmount.value) || 0;
    if (amount > portfolio.balance) {
        alert('Insufficient FunBucks');
        return;
    }

    const shares = amount / price;
    
    const newBet = {
        marketId: market.id,
        position,
        amount,
        shares,
        entryPrice: price,
        date: new Date().toISOString()
    };

    try {
        portfolio.balance -= amount;
        portfolio.bets.push(newBet);
        portfolio.history.push({
            date: new Date().toISOString(),
            value: calculateNetworth()
        });

        await db.collection('users').doc(auth.currentUser.uid).set({
            username: currentUser.username,
            funbucks: portfolio.balance,
            bets: portfolio.bets,
            history: portfolio.history,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        modal.classList.add('hidden');
        showConfirmation(market, amount, position, shares);
        updatePortfolioDisplays();
    } catch (error) {
        console.error('Error saving bet:', error);
        portfolio.balance += amount;
        portfolio.bets.pop();
        portfolio.history.pop();
        alert('Error saving bet. Please try again.');
    }
};

    marketInfo.innerHTML = `
        <img src="${market.image}" class="w-full h-32 object-cover rounded mb-4">
        <div class="mb-2 font-medium text-blue-300">${market.title}</div>
        <div class="flex items-center">
            <span>Position: ${position} @ $${price.toFixed(2)}</span>
            <span class="ml-2 ${price >= 0 ? 'text-green-400' : 'text-red-400'}">
                (${calculatePriceChange24h(market).toFixed(2)}%)
            </span>
        </div>
    `;

    betAmount.value = "10";
    betAmount.max = portfolio.balance;
    betAmount.removeEventListener('input', updateBetDetails);
    betAmount.addEventListener('input', updateBetDetails);
    updateBetDetails();

    modal.classList.remove('hidden');
    document.getElementById('confirm-bet').onclick = onConfirmBet;
    document.getElementById('cancel-bet').onclick = () => modal.classList.add('hidden');
}

function calculateNetworth() {
    const betsValue = portfolio.bets.reduce((total, bet) => {
        const { currentValue } = calculateBetValue(bet);
        return total + currentValue;
    }, 0);
    return portfolio.balance + betsValue;
}

function createChart(ctx, market) {
    if (!ctx) return;
    
    const chartId = ctx.canvas.id;
    if (chartInstances[chartId]) {
        chartInstances[chartId].destroy();
    }

    chartInstances[chartId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: market.priceHistory.map(p => formatDate(p.date)),
            datasets: [{
                label: 'Price',
                data: market.priceHistory.map(p => p.price),
                borderColor: '#4299E1',
                backgroundColor: 'rgba(66, 153, 225, 0.1)',
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                intersect: false,
                mode: 'index'
            },
            scales: {
                y: {
                    min: 0,
                    max: 1,
                    grid: {
                        color: 'rgba(226, 232, 240, 0.1)'
                    },
                    ticks: {
                        color: '#E2E8F0'
                    }
                },
                x: {
                    grid: {
                        color: 'rgba(226, 232, 240, 0.1)'
                    },
                    ticks: {
                        color: '#E2E8F0'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    backgroundColor: 'rgba(45, 55, 72, 0.9)',
                    titleColor: '#E2E8F0',
                    bodyColor: '#E2E8F0',
                    borderColor: '#4299E1',
                    borderWidth: 1,
                    displayColors: false,
                    padding: 10,
                    cornerRadius: 4
                }
            }
        }
    });

    return chartInstances[chartId];
}

function updatePortfolioChart() {
    const ctx = document.getElementById('portfolio-chart')?.getContext('2d');
    if (!ctx) return;

    const data = [
        {
            date: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000),
            value: 500
        },
        ...portfolio.history
    ];

    createChart(ctx, {
        priceHistory: data.map(d => ({
            date: d.date,
            price: d.value
        }))
    });
}

function updatePortfolioDisplays() {
    const networth = calculateNetworth();
    const betsValue = portfolio.bets.reduce((total, bet) => {
        const { currentValue } = calculateBetValue(bet);
        return total + currentValue;
    }, 0);

    document.getElementById('balance-display').textContent = `Balance: ${formatCurrency(portfolio.balance)}`;
    document.getElementById('networth-display').textContent = `Networth: ${formatCurrency(networth)}`;
    document.getElementById('portfolio-networth').textContent = formatCurrency(networth);
    document.getElementById('portfolio-balance').textContent = formatCurrency(portfolio.balance);
    document.getElementById('portfolio-bets-value').textContent = formatCurrency(betsValue);

    updatePortfolioBets();
    updatePortfolioChart();
}

function createMarketCard(market) {

    card.dataset.marketId = market.id;
    
    const priceChange24h = calculatePriceChange24h(market);
    
    card.innerHTML = `
        <img src="${market.image}" class="market-image">
        <h3 class="text-xl font-bold text-blue-300 mb-2">${market.title}</h3>
        <div class="flex items-center justify-between mb-4">
            <span class="text-sm px-3 py-1 bg-blue-900 text-blue-300 rounded-full">${market.category}</span>
            <div class="flex items-center">
                <span class="text-gray-300 mr-2">Current Price: $${market.currentPrice.toFixed(2)}</span>
                <span class="${priceChange24h >= 0 ? 'text-green-400' : 'text-red-400'}">
                    (${priceChange24h >= 0 ? '+' : ''}${priceChange24h.toFixed(2)}%)
                </span>
            </div>
        </div>
        <div class="canvas-container mb-4">
            <canvas id="chart-${market.id}"></canvas>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="event.stopPropagation(); showBettingModal(${market.id}, 'yes')" 
                    class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
                Buy Yes ($${market.currentPrice.toFixed(2)})
            </button>
            <button onclick="event.stopPropagation(); showBettingModal(${market.id}, 'no')" 
                    class="bg-red-600 text-white py-2 px-4 rounded hover:bg-red-700">
                Buy No ($${(1 - market.currentPrice).toFixed(2)})
            </button>
        </div>
    `;

    const ctx = card.querySelector(`#chart-${market.id}`).getContext('2d');
    createChart(ctx, market);

    return card;
}

function updateMarkets() {
    const containers = ['markets-container', 'asb-markets', 'sports-markets'];
    containers.forEach(containerId => {
        const container = document.getElementById(containerId);
        if (container && !container.closest('.tab-content').classList.contains('hidden')) {
            container.innerHTML = '';
            const markets = containerId === 'markets-container' 
                ? sampleMarkets 
                : sampleMarkets.filter(m => m.category.toLowerCase() === containerId.replace('-markets', ''));
            
            markets.forEach(market => {
                container.appendChild(createMarketCard(market));
            });
        }
    });
}

        const priceChangeClass = priceChange >= 0 ? 'text-green-400' : 'text-red-400';
        const positionColor = bet.position === 'yes' ? 'text-green-400' : 'text-red-400';
        
        return `
            <div class="bg-gray-800 p-4 rounded-lg border border-blue-900">
                <div class="flex items-center gap-4 mb-3">
                    <img src="${market.image}" class="w-16 h-16 rounded object-cover">
                    <div>
                        <div class="font-medium ${positionColor}">${market.title}</div>
                        <div class="text-sm text-gray-400">
                            Position: ${bet.position} @ $${bet.entryPrice.toFixed(2)}
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-3">
                    <div>
                        <div class="text-sm text-gray-400">Purchase Amount:</div>
                        <div class="text-blue-300">${formatCurrency(bet.amount)}</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-400">Shares:</div>
                        <div class="text-blue-300">${bet.shares.toFixed(2)}</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-400">Current Value:</div>
                        <div class="${priceChangeClass}">
                            ${formatCurrency(currentValue)} (${priceChange >= 0 ? '+' : ''}${priceChange.toFixed(2)}%)
                        </div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-400">Potential Payout:</div>
                        <div class="text-blue-300">${formatCurrency(potentialPayout)}</div>
                    </div>
                </div>
                <div class="text-sm text-gray-400 mt-3">
                    Placed: ${formatDate(bet.date)}
                </div>
            </div>
        `;
    }).join('');
}

document.getElementById('toggle-auth').addEventListener('click', () => {
    isLoginMode = !isLoginMode;
    const usernameInput = document.getElementById('username');
    const authButtonText = document.getElementById('auth-button-text');
    const toggleAuth = document.getElementById('toggle-auth');
    const errorMessage = document.getElementById('error-message');

    usernameInput.classList.toggle('hidden', isLoginMode);
    authButtonText.textContent = isLoginMode ? 'Login' : 'Sign Up';
    toggleAuth.textContent = isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Login";
    errorMessage.classList.add('hidden');
});

document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value;
    const errorMessage = document.getElementById('error-message');

    try {
        if (isLoginMode) {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const storedData = localStorage.getItem(`userData_${userCredential.user.uid}`);
            
            if (storedData) {
                const userData = JSON.parse(storedData);
                portfolio.balance = userData.funbucks || 500;
                portfolio.bets = userData.bets || [];
                portfolio.history = userData.history || [{
                    date: new Date().toISOString(),
                    value: portfolio.balance
                }];
                currentUser = { ...userCredential.user, ...userData };
            }
            
            document.getElementById('username-display').textContent = currentUser.username || email.split('@')[0];
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            updatePortfolioDisplays();
            updateMarkets();
        } else {
            if (!username) {
                throw new Error('Username is required');
            }
            
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const initialData = {
                username,
                funbucks: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }]
            };
            
            localStorage.setItem(`userData_${userCredential.user.uid}`, JSON.stringify(initialData));
            portfolio = {
                balance: initialData.funbucks,
                bets: initialData.bets,
                history: initialData.history
            };
            currentUser = { ...userCredential.user, ...initialData };
            
            document.getElementById('username-display').textContent = username;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            updatePortfolioDisplays();
            updateMarkets();
        }
    } catch (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.remove('hidden');
    }
});

document.getElementById('logout-button').addEventListener('click', async () => {
    try {
        await auth.signOut();
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app-container').classList.add('hidden');
        document.getElementById('auth-form').reset();
        currentUser = null;
        portfolio = {
            balance: 500,
            bets: [],
            history: []
        };
    } catch (error) {
        console.error('Logout error:', error);
    }
});

document.querySelectorAll('.tab-button').forEach(button => {
    button.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('selected', 'animate__animated', 'animate__pulse');
        });
        button.classList.add('selected', 'animate__animated', 'animate__pulse');
        
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.add('hidden');
            content.classList.remove('animate__animated', 'animate__fadeIn');
        });

        const tab = document.getElementById(`${button.dataset.tab}-tab`);
        tab.classList.remove('hidden');
        tab.classList.add('animate__animated', 'animate__fadeIn');

        if (button.dataset.tab === 'home' || button.dataset.tab === 'asb' || button.dataset.tab === 'sports') {
            updateMarkets();
        } else if (button.dataset.tab === 'portfolio') {
            updatePortfolioChart();
            updatePortfolioDisplays();
        }
    });
});


async function loadUserData(userId) {
    try {
        const doc = await db.collection('users').doc(userId).get();
        
        if (doc.exists) {
            const userData = doc.data();
            portfolio.balance = userData.funbucks || 500;
            portfolio.bets = userData.bets || [];
            portfolio.history = userData.history || [{
                date: new Date().toISOString(),
                value: 500
            }];
            currentUser = { ...auth.currentUser, ...userData };
            document.getElementById('username-display').textContent = userData.username;
            updatePortfolioDisplays();
        } else {
            // Initialize new user
            const initialData = {
                username: auth.currentUser.email.split('@')[0],
                funbucks: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('users').doc(userId).set(initialData);
            
            portfolio = {
                balance: initialData.funbucks,
                bets: initialData.bets,
                history: initialData.history
            };
            currentUser = { ...auth.currentUser, ...initialData };
            document.getElementById('username-display').textContent = initialData.username;
        }
    } catch (error) {
        console.error('Error loading user data:', error);
    }
}

async function updateUserData() {
    if (!auth.currentUser) return;
    
    try {
        await db.collection('users').doc(auth.currentUser.uid).set({
            username: currentUser.username,
            funbucks: portfolio.balance,
            bets: portfolio.bets,
            history: portfolio.history,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
    } catch (error) {
        console.error('Error updating user data:', error);
        throw error;
    }
}



auth.onAuthStateChanged(async (user) => {
    try {
        if (user) {
            currentUser = user;
            await loadUserData(user.uid);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            updatePortfolioDisplays();
            updateMarkets();
        } else {
            currentUser = null;
            portfolio = {
                balance: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }]
            };
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('auth-form').reset();
            document.getElementById('error-message').classList.add('hidden');
        }
    } catch (error) {
        console.error('Auth state change error:', error);
    }
});

</script>
</body>
</html>
