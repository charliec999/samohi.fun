};


const DEFAULT_PROFILE_PIC = "https://polymarket.com/_next/image?url=https%3A%2F%2Fpolymarket-upload.s3.us-east-2.amazonaws.com%2F31669764_829bfb7d-c27d-4c9a-8b78-dd9135282938_1730892972459.png&w=256&q=100";
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage && firebase.storage();

const isAdmin = async (userId) => {
    try {
        const userDoc = await db.collection('users').doc(userId).get();
        return userDoc.exists && userDoc.data().isAdmin === true;
    } catch (error) {
        console.error('Error checking admin status:', error);
        return false;
    }
};

auth.onAuthStateChanged(async (user) => {
    try {
        if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            
            if (userDoc.exists) {
                const userData = userDoc.data();
                currentUser = {
                    uid: user.uid,
                    email: user.email,
                    ...userData
                };
                
                // Update UI
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('username-display').textContent = userData.username;
                
                // Check admin status and show/hide admin panel
                const adminButton = document.getElementById('admin-panel-btn');
                const isAdminUser = await isAdmin(user.uid);
                if (adminButton) {
                    if (isAdminUser) {
                        adminButton.classList.remove('hidden');
                        adminButton.onclick = showAdminPanel;
                    } else {
                        adminButton.classList.add('hidden');
                    }
                }
                
                // Load markets and update displays
                await getMarkets();
                await updatePortfolioDisplays();
                await updateMarkets();
            }
        } else {
            // Reset state on logout
            currentUser = null;
            markets = [];
            portfolio = {
                balance: 500,
                bets: [],
                history: []
            };
            
            // Update UI
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('auth-form').reset();
        }
    } catch (error) {
        console.error('Auth state change error:', error);
        alert('Error with authentication. Please try again.');
    }
});

let chartInstances = {};

let isLoginMode = true;

    balance: 500,

    history: []
};
const marketCategories = ['All', 'ASB', 'Sports', 'Clubs', 'Teacher', 'Around Campus', 'Daily'];

async function updateProfile(newUsername, newProfilePic) {
    try {
        await db.collection('users').doc(auth.currentUser.uid).update({
            username: newUsername,
            profilePicture: newProfilePic || DEFAULT_PROFILE_PIC
        });
        currentUser.username = newUsername;
        currentUser.profilePicture = newProfilePic || DEFAULT_PROFILE_PIC;
        document.getElementById('username-display').textContent = newUsername;
        alert('Profile updated successfully!');
    } catch (error) {
        console.error('Error updating profile:', error);
        alert('Error updating profile');
    }
}

async function resolveMarket(marketId) {
    const result = confirm('Resolve market as Yes? (Cancel for No)');
    try {
        const resolutionTime = Date.now();
        await db.collection('markets').doc(marketId).update({
            resolved: true,
            finalResult: result,
            resolvedAt: resolutionTime,
            challengePeriodEnd: resolutionTime + (2 * 60 * 60 * 1000), // 2 hours
            challenges: []
        });
        
        startResolutionTimer(marketId, resolutionTime);
        alert('Market resolved. Users have 2 hours to challenge this resolution.');
    } catch (error) {
        console.error('Error resolving market:', error);
        alert('Error resolving market');
    }
}

function startResolutionTimer(marketId, resolutionTime) {
    const challengeEnd = resolutionTime + (2 * 60 * 60 * 1000);
    const timerDiv = document.createElement('div');
    timerDiv.className = 'resolution-timer';
    
    const updateTimer = () => {
        const now = Date.now();
        const remaining = challengeEnd - now;
        
        if (remaining <= 0) {
            timerDiv.remove();
            finalizeResolution(marketId);
            return;
        }
        
        const hours = Math.floor(remaining / (60 * 60 * 1000));
        const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
        const seconds = Math.floor((remaining % (60 * 1000)) / 1000);
        
        timerDiv.textContent = `Challenge period: ${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    };
    
    updateTimer();
    const interval = setInterval(updateTimer, 1000);
    
    // Add challenge button
    const challengeBtn = document.createElement('button');
    challengeBtn.className = 'bg-red-600 text-white px-4 py-2 rounded-lg mt-2';
    challengeBtn.textContent = 'Challenge Resolution';
    challengeBtn.onclick = () => showChallengeForm(marketId);
    
    timerDiv.appendChild(challengeBtn);
    document.querySelector(`[data-market-id="${marketId}"]`).appendChild(timerDiv);
}

function calculatePriceChange24h(market) {
            if (!Array.isArray(market.priceHistory)) {
                return 0;
            }
            const last24h = market.priceHistory
                .filter(p => new Date(p.date) >= new Date(Date.now() - 24 * 60 * 60 * 1000))
                .map(p => p.price);
            if (last24h.length < 2) return 0;
            const previousPrice = last24h[0];
            const currentPrice = market.currentPrice;
            return ((currentPrice - previousPrice) / previousPrice) * 100;
        }

class UserDataStore {
    constructor() {
        this.db = null;
        this.init();
    }

    async init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(db.name, db.version);

            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                this.db = request.result;
                resolve();
            };

            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(db.store)) {
                    db.createObjectStore(db.store, { keyPath: 'userId' });
                }
            };
        });
    }

    async saveUserData(userId, data) {
        if (!this.db) await this.init();
        
        return new Promise((resolve, reject) => {
            const transaction = this.db.transaction([db.store], 'readwrite');
            const store = transaction.objectStore(db.store);
            
            const request = store.put({
                userId,
                ...data,
                lastUpdated: new Date()
            });

            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async getUserData(userId) {
        if (!this.db) await this.init();

        return new Promise((resolve, reject) => {
            const transaction = this.db.transaction([db.store], 'readonly');
            const store = transaction.objectStore(db.store);
            const request = store.get(userId);

            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
}

function calculateBetValue(bet) {
    const market = markets.find(m => m.id === bet.marketId);
    if (!market) return { currentValue: 0, potentialPayout: 0, priceChange24h: 0 };

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const currentValue = bet.shares * currentPrice;
    const potentialPayout = bet.shares;
    const priceChange24h = calculatePriceChange24h(market);

    return {
        currentValue,
        potentialPayout,
        priceChange24h,
        priceChange: ((currentPrice - bet.entryPrice) / bet.entryPrice) * 100
    };
}

// Update showBettingModal function
function showBettingModal(market, position) {
    const modal = document.getElementById('betting-modal');
    const marketInfo = document.getElementById('modal-market-info');
    const betAmount = document.getElementById('bet-amount');
    const betDetails = document.getElementById('bet-details');
    const price = position === 'yes' ? market.currentPrice : (1 - market.currentPrice);

    function updateBetDetails() {
        const amount = parseFloat(betAmount.value) || 0;
        const shares = amount / price;
        const potentialPayout = shares;

        betDetails.innerHTML = `
            <div>Shares: ${shares.toFixed(2)}</div>
            <div>Cost: ${formatCurrency(amount)}</div>
            <div>Potential Payout: ${formatCurrency(potentialPayout)}</div>
        `;
    }

    marketInfo.innerHTML = `
        <img src="${market.image}" class="w-full h-32 object-cover rounded mb-4">
        <div class="mb-2 font-medium text-blue-300">${market.title}</div>
        <div class="flex items-center">
            <span>Position: ${position} @ $${price.toFixed(2)}</span>
            <span class="ml-2 ${price >= 0 ? 'text-green-400' : 'text-red-400'}">
                (${calculatePriceChange24h(market).toFixed(2)}%)
            </span>
        </div>
    `;

    betAmount.value = "10";
    betAmount.max = portfolio.balance;
    betAmount.removeEventListener('input', updateBetDetails);
    betAmount.addEventListener('input', updateBetDetails);
    updateBetDetails();

    modal.classList.remove('hidden');

    // Update confirm bet handler
    const confirmBtn = document.getElementById('confirm-bet');
    const cancelBtn = document.getElementById('cancel-bet');
    
    const confirmBetHandler = async () => {
        try {
            const amount = parseFloat(betAmount.value) || 0;
            if (amount > portfolio.balance) {
                alert('Insufficient FunBucks');
                return;
            }

            const shares = amount / price;
            
            const newBet = {
                marketId: market.id,
                position,
                amount,
                shares,
                entryPrice: price,
                date: new Date().toISOString()
            };

            portfolio.balance -= amount;
            portfolio.bets.push(newBet);
            portfolio.history.push({
                date: new Date().toISOString(),
                value: calculateNetworth()
            });

            await updateUserData();
            modal.classList.add('hidden');
            showConfirmation(market, amount, position, shares);
            updatePortfolioDisplays();
            updateMarkets();
        } catch (error) {
            console.error('Error placing bet:', error);
            alert('Error placing bet. Please try again.');
        }
    };

    confirmBtn.onclick = confirmBetHandler;
    cancelBtn.onclick = () => modal.classList.add('hidden');
}

function calculateNetworth() {
    const betsValue = portfolio.bets.reduce((total, bet) => {
        const { currentValue } = calculateBetValue(bet);
        return total + currentValue;
    }, 0);
    return portfolio.balance + betsValue;
}

function createChart(ctx, market) {
    if (!ctx) return;
    
    const chartId = ctx.canvas.id;
    if (chartInstances[chartId]) {
        chartInstances[chartId].destroy();
    }

    chartInstances[chartId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: market.priceHistory.map(p => formatDate(p.date)),
            datasets: [{
                label: 'Price',
                data: market.priceHistory.map(p => p.price),
                borderColor: '#4299E1',
                backgroundColor: 'rgba(66, 153, 225, 0.1)',
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                intersect: false,
                mode: 'index'
            },
            scales: {
                y: {
                    min: 0,
                    max: 1,
                    grid: {
                        color: 'rgba(226, 232, 240, 0.1)'
                    },
                    ticks: {
                        color: '#E2E8F0'
                    }
                },
                x: {
                    grid: {
                        color: 'rgba(226, 232, 240, 0.1)'
                    },
                    ticks: {
                        color: '#E2E8F0'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    backgroundColor: 'rgba(45, 55, 72, 0.9)',
                    titleColor: '#E2E8F0',
                    bodyColor: '#E2E8F0',
                    borderColor: '#4299E1',
                    borderWidth: 1,
                    displayColors: false,
                    padding: 10,
                    cornerRadius: 4
                }
            }
        }
    });

    return chartInstances[chartId];
}

function updatePortfolioChart() {
    const ctx = document.getElementById('portfolio-chart')?.getContext('2d');
    if (!ctx) return;

    const historyData = portfolio.history.map(item => ({
        date: new Date(item.date),
        value: item.value
    })).sort((a, b) => a.date - b.date);

    if (historyData.length === 0) {
        historyData.unshift({
            date: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000),
            value: 500
        });
    }

    createChart(ctx, {
        priceHistory: historyData.map(item => ({
            date: item.date,
            price: item.value
        }))
    });
}

function updatePortfolioDisplays() {
    const networth = calculateNetworth();
    const betsValue = portfolio.bets.reduce((total, bet) => {
        const { currentValue } = calculateBetValue(bet);
        return total + currentValue;
    }, 0);

    document.getElementById('balance-display').textContent = `Balance: ${formatCurrency(portfolio.balance)}`;
    document.getElementById('networth-display').textContent = `Networth: ${formatCurrency(networth)}`;
    document.getElementById('portfolio-networth').textContent = formatCurrency(networth);
    document.getElementById('portfolio-balance').textContent = formatCurrency(portfolio.balance);
    document.getElementById('portfolio-bets-value').textContent = formatCurrency(betsValue);

    updatePortfolioBets();
    updatePortfolioChart();
}

async function loadComments(marketId) {
    const commentsContainer = document.getElementById(`comments-list-${marketId}`);
    
    try {
        const snapshot = await db.collection('markets')
            .doc(marketId.toString())
            .collection('comments')
            .orderBy('timestamp', 'desc')
            .get();

        const comments = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        if (comments.length === 0) {
            commentsContainer.innerHTML = `
                <div class="text-center text-gray-400 py-8">
                    Be the first to comment on this market!
                </div>
            `;
            return;
        }

        commentsContainer.innerHTML = comments.map(comment => `
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <span class="font-medium text-blue-300">${comment.username}</span>
                        <span class="text-xs text-gray-400">
                            ${new Date(comment.timestamp).toLocaleString()}
                        </span>
                    </div>
                    ${comment.userId === auth.currentUser?.uid ? `
                        <button onclick="deleteComment('${marketId}', '${comment.id}')"
                                class="text-red-400 hover:text-red-300 text-sm">
                            Delete
                        </button>
                    ` : ''}
                </div>
                <p class="text-gray-300">${comment.text}</p>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading comments:', error);
        commentsContainer.innerHTML = `
            <div class="text-center text-red-400 py-8">
                Error loading comments. Please try again later.
            </div>
        `;
    }
}

async function postComment(marketId) {
    if (!auth.currentUser) {
        alert('Please sign in to comment');
        return;
    }

    const input = document.getElementById(`comment-input-${marketId}`);
    const text = input.value.trim();
    
    if (!text) return;

    try {
        const comment = {
            userId: auth.currentUser.uid,
            username: currentUser.username,
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection('markets')
            .doc(marketId.toString())
            .collection('comments')
            .add(comment);

        input.value = '';
        loadComments(marketId);
    } catch (error) {
        console.error('Error posting comment:', error);
        alert('Error posting comment. Please try again.');
    }
}

async function deleteComment(marketId, commentId) {
    if (!confirm('Are you sure you want to delete this comment?')) return;

    try {
        await db.collection('markets')
            .doc(marketId.toString())
            .collection('comments')
            .doc(commentId)
            .delete();

        loadComments(marketId);
    } catch (error) {
        console.error('Error deleting comment:', error);
        alert('Error deleting comment. Please try again.');
    }
}

        await db.collection('markets').doc(marketId).update({
            priceHistory: [{
                date: new Date(),

            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.querySelector('.fixed').remove();
        alert('Market history reset successfully!');

async function sellBet(betIndex) {
    const bet = portfolio.bets[betIndex];
    const market = markets.find(m => m.id === bet.marketId);
    if (!market || !bet) return;

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const sellValue = bet.shares * currentPrice;

    try {
        portfolio.balance += sellValue;
        portfolio.bets.splice(betIndex, 1);
        portfolio.history.push({
            date: new Date().toISOString(),
            value: calculateNetworth()
        });

        await updateUserData();
        document.querySelector('.fixed').remove();
        updatePortfolioDisplays();
        showSellSuccessMessage(sellValue);
    } catch (error) {
        console.error('Error selling bet:', error);
        alert('Error selling bet. Please try again.');
    }
}

    const market = markets.find(m => m.id === bet.marketId);
    if (!market || !bet) return;

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const sellValue = bet.shares * currentPrice;
    const priceChange = ((currentPrice - bet.entryPrice) / bet.entryPrice) * 100;
    const priceChangeClass = priceChange >= 0 ? 'text-green-400' : 'text-red-400';

    const confirmation = document.createElement('div');
    confirmation.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';
    confirmation.innerHTML = `

async function updateLeaderboard() {
    const leaderboardList = document.getElementById('leaderboard-list');
    if (!leaderboardList) return;

    try {
        const snapshot = await db.collection('users')
            .orderBy('funbucks', 'desc')
            .limit(10)
            .get();

        const leaders = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        leaderboardList.innerHTML = leaders.map((user, index) => `
            <div class="bg-gray-800 p-6 rounded-lg border border-blue-900 cursor-pointer hover:border-blue-500 transition-colors mb-6"
             onclick="showUserProfile('${user.id}')">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-4">
                    <div class="text-2xl font-bold ${index < 3 ? 'text-yellow-400' : 'text-gray-400'}">#${index + 1}</div>
                    <img src="${user.profilePicture || DEFAULT_PROFILE_PIC}" 
                         class="w-12 h-12 rounded-full object-cover border-2 border-blue-500">
                    <div>
                        <div class="font-medium text-blue-300">${user.username}</div>
                        <div class="text-green-400">${formatCurrency(user.funbucks)}</div>
                    </div>
                </div>
                <div class="text-gray-400">
                    ${user.bets?.length || 0} Bets
                </div>
            </div>
            <div class="h-32">
                <canvas id="user-chart-${user.id}"></canvas>
            </div>
        </div>
        `).join('');

        // Create charts for each user
        leaders.forEach(user => {
            const ctx = document.getElementById(`user-chart-${user.id}`)?.getContext('2d');
            if (!ctx) return;

            const historyData = (user.history || [])
                .map(item => ({
                    date: new Date(item.date),
                    value: item.value
                }))
                .sort((a, b) => a.date - b.date);

            if (historyData.length === 0) {
                historyData.push({
                    date: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000),
                    value: 500
                });
            }

            createChart(ctx, {
                priceHistory: historyData.map(item => ({
                    date: item.date,
                    price: item.value
                }))
            });
        });

    } catch (error) {
        console.error('Error updating leaderboard:', error);
        leaderboardList.innerHTML = '<div class="text-red-400">Error loading leaderboard</div>';
    }
}

async function showUserProfile(userId) {
    try {
        const userDoc = await db.collection('users').doc(userId).get();
        if (!userDoc.exists) return;
        
        const userData = userDoc.data();
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';
        
        const betsHtml = userData.bets?.map(bet => {
            const market = sampleMarkets.find(m => m.id === bet.marketId);
            if (!market) return '';
            
            return `
                <div class="bg-gray-800 p-3 rounded border border-blue-900">
                    <div class="font-medium ${bet.position === 'yes' ? 'text-green-400' : 'text-red-400'}">
                        ${market.title}

                    <div class="text-sm text-gray-400">
                        Position: ${bet.position} @ $${bet.entryPrice.toFixed(2)}
                    </div>
                    <div class="text-sm text-blue-300">
                        Amount: ${formatCurrency(bet.amount)}
                    </div>
                    <div class="text-sm text-gray-400">
                        Placed: ${formatDate(bet.date)}

        }).join('') || '<div class="text-gray-400">No bets placed yet</div>';

        document.body.appendChild(modal);

        const ctx = document.getElementById(`profile-chart-${userId}`)?.getContext('2d');
        if (ctx) {

            if (historyData.length === 0) {

            createChart(ctx, {

// Update auth event handler
document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value;
    const errorMessage = document.getElementById('error-message');

    try {
        if (isLoginMode) {
            // Simple login with email/password
            await auth.signInWithEmailAndPassword(email, password);
        } else {
            // For signup, check if username exists first
            const existingUsers = await db.collection('users')
                .where('username', '==', username)
                .get();

            if (!existingUsers.empty) {
                throw new Error('Username already taken');
            }

            // Create the user
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);

            // Create the user document
            await db.collection('users').doc(userCredential.user.uid).set({
                username: username,
                email: email,
                funbucks: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Set current user
            currentUser = {
                uid: userCredential.user.uid,
                username: username,
                email: email
            };
        }

        // Clear error and form
        errorMessage.classList.add('hidden');
        e.target.reset();

    } catch (error) {
        console.error('Auth error:', error);
        errorMessage.textContent = error.message;
        errorMessage.classList.remove('hidden');
    }
});

document.getElementById('logout-button').addEventListener('click', async () => {

document.querySelectorAll('.tab-button').forEach(button => {

        document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('selected', 'animate__animated', 'animate__pulse');
        });
        button.classList.add('selected', 'animate__animated', 'animate__pulse');
        
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.add('hidden');
            content.classList.remove('animate__animated', 'animate__fadeIn');
        });

        const tab = document.getElementById(`${button.dataset.tab}-tab`);
        tab.classList.remove('hidden');
        tab.classList.add('animate__animated', 'animate__fadeIn');

        if (button.dataset.tab === 'home' || button.dataset.tab === 'asb' || button.dataset.tab === 'sports') {
            updateMarkets();
        } else if (button.dataset.tab === 'portfolio') {
            updatePortfolioChart();

        }
    });
});


async function loadUserData(userId) {
    try {
        const doc = await db.collection('users').doc(userId).get();
        
        if (doc.exists) {
            const userData = doc.data();
            portfolio.balance = userData.funbucks || 500;
            portfolio.bets = userData.bets || [];
            portfolio.history = userData.history || [{
                date: new Date().toISOString(),
                value: 500
            }];
            currentUser = { ...auth.currentUser, ...userData };
            document.getElementById('username-display').textContent = userData.username;
            updatePortfolioDisplays();
        } else {
            // Initialize new user
            const initialData = {
                username: auth.currentUser.email.split('@')[0],
                funbucks: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('users').doc(userId).set(initialData);
            
            portfolio = {
                balance: initialData.funbucks,
                bets: initialData.bets,
                history: initialData.history
            };
            currentUser = { ...auth.currentUser, ...initialData };
            document.getElementById('username-display').textContent = initialData.username;
        }
    } catch (error) {
        console.error('Error loading user data:', error);
    }
}

async function updateUserData() {
    if (!auth.currentUser) return;
    
    try {
        await db.collection('users').doc(auth.currentUser.uid).set({
            username: currentUser.username,
            funbucks: portfolio.balance,
            bets: portfolio.bets,
            history: portfolio.history,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
    } catch (error) {
        console.error('Error updating user data:', error);
        throw error;
    }
}



auth.onAuthStateChanged(async (user) => {
    try {
        if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            
            if (userDoc.exists) {
                const userData = userDoc.data();
                currentUser = {
                    uid: user.uid,
                    ...userData
                };
                
                // Update UI
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('username-display').textContent = userData.username;
                
                // Load initial data
                await getMarkets();
                await updatePortfolioDisplays();
                await updateMarkets();
            }
        } else {
            // Reset state on logout
            currentUser = null;
            markets = [];
            portfolio = {
                balance: 500,
                bets: [],
                history: []
            };
            
            // Update UI
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('auth-form').reset();
        }
    } catch (error) {
        console.error('Auth state change error:', error);
        alert('Error with authentication. Please try again.');
    }
});
