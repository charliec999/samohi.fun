async function createMarket() {
    try {
        const title = document.getElementById('market-title').value;
        const description = document.getElementById('market-description').value;
        const category = document.getElementById('market-category').value;
        const image = document.getElementById('market-image').value;
        const initialPrice = parseFloat(document.getElementById('market-price').value);

        if (!title || !description || !category || !image || isNaN(initialPrice)) {
            alert('Please fill all fields');
            return;
        }

        const marketData = {
            title,
            description,
            category,
            image,
            currentPrice: initialPrice,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            active: true,
            resolved: false,
            priceHistory: [{
                date: new Date(),
                price: initialPrice
            }]
        };

        await db.collection('markets').add(marketData);
        alert('Market created successfully!');
        loadAdminMarkets();
    } catch (error) {
        console.error('Error creating market:', error);
        alert('Error creating market');
    }
}

async function updateMarketPrice(marketId) {
    const newPrice = prompt('Enter new price (0-1):');
    if (newPrice === null) return;

    const price = parseFloat(newPrice);
    if (isNaN(price) || price < 0 || price > 1) {
        alert('Invalid price. Please enter a number between 0 and 1');
        return;
    }

    try {
        await db.collection('markets').doc(marketId).update({
            currentPrice: price,
            [`priceHistory.${Date.now()}`]: price
        });
        alert('Price updated successfully!');
        loadAdminMarkets();
    } catch (error) {
        console.error('Error updating price:', error);
        alert('Error updating price');
    }
}
async function resolveMarket(marketId) {
    const result = confirm('Resolve market as Yes? (Cancel for No)');
    try {
        await db.collection('markets').doc(marketId).update({
            resolved: true,
            finalResult: result,
            resolvedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        // Here you would add logic to pay out bets
        alert('Market resolved successfully!');
        loadAdminMarkets();
    } catch (error) {
        console.error('Error resolving market:', error);
        alert('Error resolving market');
    }
}

async function deleteMarket(marketId) {
    if (!confirm('Are you sure you want to delete this market?')) return;

    try {
        await db.collection('markets').doc(marketId).delete();
        alert('Market deleted successfully!');
        loadAdminMarkets();
    } catch (error) {
        console.error('Error deleting market:', error);
        alert('Error deleting market');
    }
}


async function getMarkets() {
    try {
        const snapshot = await db.collection('markets').get();
        return snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data(),
            priceHistory: doc.data().priceHistory || [{
                date: new Date(doc.data().createdAt.seconds * 1000),
                price: doc.data().currentPrice
            }]
        }));
    } catch (error) {
        console.error('Error fetching markets:', error);
        return [];
    }
}

function formatDate(date) {
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const d = new Date(date);
    return `${months[d.getMonth()]} ${d.getDate()} (${d.getFullYear().toString().slice(2)})`;
}

function formatCurrency(amount) {
    return `${amount.toFixed(2)} FunBucks`;
}

function calculatePriceChange24h(market) {
    const last24h = market.priceHistory
        .filter(p => p.date >= new Date(Date.now() - 24 * 60 * 60 * 1000))
        .map(p => p.price);
    if (last24h.length < 2) return 0;
    const previousPrice = last24h[0];
    const currentPrice = market.currentPrice;
    return ((currentPrice - previousPrice) / previousPrice) * 100;
}

class UserDataStore {
    constructor() {
        this.db = null;
        this.init();
    }

    async init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(db.name, db.version);

            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                this.db = request.result;
                resolve();
            };

            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(db.store)) {
                    db.createObjectStore(db.store, { keyPath: 'userId' });
                }
            };
        });
    }

    async saveUserData(userId, data) {
        if (!this.db) await this.init();
        
        return new Promise((resolve, reject) => {
            const transaction = this.db.transaction([db.store], 'readwrite');
            const store = transaction.objectStore(db.store);
            
            const request = store.put({
                userId,
                ...data,
                lastUpdated: new Date()
            });

            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async getUserData(userId) {
        if (!this.db) await this.init();

        return new Promise((resolve, reject) => {
            const transaction = this.db.transaction([db.store], 'readonly');
            const store = transaction.objectStore(db.store);
            const request = store.get(userId);

            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
}

function calculateBetValue(bet) {
    const market = sampleMarkets.find(m => m.id === bet.marketId);
    if (!market) return { currentValue: 0, potentialPayout: 0, priceChange24h: 0 };

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const currentValue = bet.shares * currentPrice;
    const potentialPayout = bet.shares;
    const priceChange24h = calculatePriceChange24h(market);

    return {
        currentValue,
        potentialPayout,
        priceChange24h,
        priceChange: ((currentPrice - bet.entryPrice) / bet.entryPrice) * 100
    };
}

}

function createChart(ctx, market) {

    const chartId = ctx.canvas.id;
    if (chartInstances[chartId]) {
        chartInstances[chartId].destroy();
    }

    chartInstances[chartId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: market.priceHistory.map(p => formatDate(p.date)),
            datasets: [{
                label: 'Price',
                data: market.priceHistory.map(p => p.price),
                borderColor: '#4299E1',
                backgroundColor: 'rgba(66, 153, 225, 0.1)',
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                intersect: false,
                mode: 'index'
            },
            scales: {
                y: {
                    min: 0,
                    max: 1,
                    grid: {
                        color: 'rgba(226, 232, 240, 0.1)'
                    },
                    ticks: {
                        color: '#E2E8F0'
                    }
                },
                x: {
                    grid: {
                        color: 'rgba(226, 232, 240, 0.1)'
                    },
                    ticks: {
                        color: '#E2E8F0'
                    }
                }
            },
            plugins: {
                legend: {

                },
                tooltip: {
                    backgroundColor: 'rgba(45, 55, 72, 0.9)',
                    titleColor: '#E2E8F0',
                    bodyColor: '#E2E8F0',
                    borderColor: '#4299E1',
                    borderWidth: 1,
                    displayColors: false,
                    padding: 10,
                    cornerRadius: 4

    });

    return chartInstances[chartId];
}

function updatePortfolioChart() {
    const ctx = document.getElementById('portfolio-chart')?.getContext('2d');
    if (!ctx) return;

    const historyData = portfolio.history.map(item => ({
        date: new Date(item.date),
        value: item.value
    })).sort((a, b) => a.date - b.date);

    if (historyData.length === 0) {
        historyData.unshift({
            date: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000),
            value: 500
        });
    }

    createChart(ctx, {
        priceHistory: historyData.map(item => ({
            date: item.date,
            price: item.value
        }))
    });
}

async function loadComments(marketId) {
    const commentsContainer = document.getElementById(`comments-list-${marketId}`);
    
    try {
        const snapshot = await db.collection('markets')
            .doc(marketId.toString())
            .collection('comments')
            .orderBy('timestamp', 'desc')
            .get();

        const comments = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        if (comments.length === 0) {
            commentsContainer.innerHTML = `
                <div class="text-center text-gray-400 py-8">
                    Be the first to comment on this market!
                </div>
            `;
            return;
        }

        commentsContainer.innerHTML = comments.map(comment => `
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">

                    </div>

                        <button onclick="deleteComment('${marketId}', '${comment.id}')"
                                class="text-red-400 hover:text-red-300 text-sm">
                            Delete
                        </button>
                    ` : ''}
                </div>
                <p class="text-gray-300">${comment.text}</p>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading comments:', error);
        commentsContainer.innerHTML = `
            <div class="text-center text-red-400 py-8">
                Error loading comments. Please try again later.
            </div>
        `;
    }
}

    try {

async function sellBet(betIndex) {
    const bet = portfolio.bets[betIndex];
    const market = sampleMarkets.find(m => m.id === bet.marketId);
    if (!market || !bet) return;

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const sellValue = bet.shares * currentPrice;

    try {
        portfolio.balance += sellValue;
        portfolio.bets.splice(betIndex, 1);
        portfolio.history.push({
            date: new Date().toISOString(),
            value: calculateNetworth()
        });

        await updateUserData();
        document.querySelector('.fixed').remove();
        updatePortfolioDisplays();
        showSellSuccessMessage(sellValue);
    } catch (error) {
        console.error('Error selling bet:', error);
        alert('Error selling bet. Please try again.');
    }
}

function showSellConfirmation(betIndex) {
    const bet = portfolio.bets[betIndex];
    const market = sampleMarkets.find(m => m.id === bet.marketId);
    if (!market || !bet) return;

    const currentPrice = bet.position === 'yes' ? market.currentPrice : (1 - market.currentPrice);
    const sellValue = bet.shares * currentPrice;
    const priceChange = ((currentPrice - bet.entryPrice) / bet.entryPrice) * 100;
    const priceChangeClass = priceChange >= 0 ? 'text-green-400' : 'text-red-400';

    const confirmation = document.createElement('div');
    confirmation.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';
    confirmation.innerHTML = `
        <div class="confirmation-modal p-6 rounded-lg shadow-lg max-w-md w-full">
            <h3 class="text-xl font-bold mb-4 text-blue-300">Confirm Sale</h3>
            <img src="${market.image}" class="w-full h-32 object-cover rounded mb-4">
            <div class="mb-4">
                <div class="text-gray-300 mb-2">${market.title}</div>
                <div class="text-blue-300">Original Purchase: ${formatCurrency(bet.amount)}</div>
                <div class="text-blue-300">Shares: ${bet.shares.toFixed(2)}</div>
                <div class="${priceChangeClass}">
                    Sale Value: ${formatCurrency(sellValue)} (${priceChange >= 0 ? '+' : ''}${priceChange.toFixed(2)}%)
                </div>
            </div>
            <div class="flex space-x-3">
                <button onclick="sellBet(${betIndex})" class="flex-1 bg-red-600 text-white p-2 rounded hover:bg-red-700">
                    Confirm Sale
                </button>
                <button onclick="this.closest('.fixed').remove()" class="flex-1 border border-blue-500 text-blue-400 p-2 rounded hover:bg-blue-900">
                    Cancel
                </button>
            </div>
        </div>
    `;

    document.body.appendChild(confirmation);
}

function showSellSuccessMessage(sellValue) {
    const message = document.createElement('div');
    message.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';
    message.innerHTML = `
        <div class="confirmation-modal p-6 rounded-lg shadow-lg max-w-md w-full">
            <div class="text-xl font-bold mb-4 text-green-400">Bet Sold Successfully!</div>
            <div class="mb-4">
                <div class="text-blue-300">You received: ${formatCurrency(sellValue)}</div>
                <div class="text-gray-300">Your new balance: ${formatCurrency(portfolio.balance)}</div>
            </div>
            <button onclick="this.closest('.fixed').remove()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
                Close
            </button>
        </div>
    `;

    document.body.appendChild(message);
}
async function updateLeaderboard() {
    const leaderboardList = document.getElementById('leaderboard-list');
    if (!leaderboardList) return;

    try {
        const snapshot = await db.collection('users')
            .orderBy('funbucks', 'desc')
            .limit(10)
            .get();

        const leaders = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        leaderboardList.innerHTML = leaders.map((user, index) => `
            <div class="bg-gray-800 p-6 rounded-lg border border-blue-900 cursor-pointer hover:border-blue-500 transition-colors mb-6"
                 onclick="showUserProfile('${user.id}')">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-4">
                        <div class="text-2xl font-bold ${index < 3 ? 'text-yellow-400' : 'text-gray-400'}">#${index + 1}</div>
                        <div>
                            <div class="font-medium text-blue-300">${user.username}</div>
                            <div class="text-green-400">${formatCurrency(user.funbucks)}</div>
                        </div>
                    </div>
                    <div class="text-gray-400">
                        ${user.bets?.length || 0} Bets
                    </div>
                </div>
                <div class="h-32">
                    <canvas id="user-chart-${user.id}"></canvas>
                </div>
            </div>
        `).join('');

        // Create charts for each user
        leaders.forEach(user => {
            const ctx = document.getElementById(`user-chart-${user.id}`)?.getContext('2d');
            if (!ctx) return;

            const historyData = (user.history || [])
                .map(item => ({
                    date: new Date(item.date),
                    value: item.value
                }))
                .sort((a, b) => a.date - b.date);

            if (historyData.length === 0) {
                historyData.push({
                    date: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000),
                    value: 500
                });
            }

            createChart(ctx, {
                priceHistory: historyData.map(item => ({
                    date: item.date,
                    price: item.value
                }))
            });
        });

    } catch (error) {
        console.error('Error updating leaderboard:', error);
        leaderboardList.innerHTML = '<div class="text-red-400">Error loading leaderboard</div>';
    }
}

async function showUserProfile(userId) {
    try {
        const userDoc = await db.collection('users').doc(userId).get();
        if (!userDoc.exists) return;
        
        const userData = userDoc.data();
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';
        
        const betsHtml = userData.bets?.map(bet => {
            const market = sampleMarkets.find(m => m.id === bet.marketId);
            if (!market) return '';
            
            return `
                <div class="bg-gray-800 p-3 rounded border border-blue-900">
                    <div class="font-medium ${bet.position === 'yes' ? 'text-green-400' : 'text-red-400'}">
                        ${market.title}
                    </div>
                    <div class="text-sm text-gray-400">
                        Position: ${bet.position} @ $${bet.entryPrice.toFixed(2)}
                    </div>
                    <div class="text-sm text-blue-300">
                        Amount: ${formatCurrency(bet.amount)}
                    </div>
                    <div class="text-sm text-gray-400">
                        Placed: ${formatDate(bet.date)}
                    </div>
                </div>
            `;
        }).join('') || '<div class="text-gray-400">No bets placed yet</div>';

        modal.innerHTML = `
            <div class="confirmation-modal p-6 rounded-lg shadow-lg max-w-2xl w-full max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-blue-300">${userData.username}'s Profile</h3>
                    <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-white">✕</button>
                </div>
                <div class="mb-4">
                    <div class="text-gray-400">Balance</div>
                    <div class="text-2xl font-bold text-green-400">${formatCurrency(userData.funbucks)}</div>
                </div>
                <div class="mb-6">
                    <h4 class="text-lg font-semibold mb-3 text-blue-300">Portfolio History</h4>
                    <div class="h-64">
                        <canvas id="profile-chart-${userId}"></canvas>
                    </div>
                </div>
                <div>
                    <h4 class="text-lg font-semibold mb-3 text-blue-300">Bet History</h4>
                    <div class="space-y-2">
                        ${betsHtml}
                    </div>
                </div>
            </div>
        `;

        document.body.appendChild(modal);

        const ctx = document.getElementById(`profile-chart-${userId}`)?.getContext('2d');
        if (ctx) {
            const historyData = (userData.history || [])
                .map(item => ({
                    date: new Date(item.date),
                    value: item.value
                }))
                .sort((a, b) => a.date - b.date);

            if (historyData.length === 0) {
                historyData.push({
                    date: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000),
                    value: 500
                });
            }

            createChart(ctx, {
                priceHistory: historyData.map(item => ({
                    date: item.date,
                    price: item.value
                }))
            });
        }
    } catch (error) {
        console.error('Error showing user profile:', error);
    }
}


document.getElementById('toggle-auth').addEventListener('click', () => {
    isLoginMode = !isLoginMode;
    const usernameInput = document.getElementById('username');
    const authButtonText = document.getElementById('auth-button-text');
    const toggleAuth = document.getElementById('toggle-auth');
    const errorMessage = document.getElementById('error-message');

    usernameInput.classList.toggle('hidden', isLoginMode);
    authButtonText.textContent = isLoginMode ? 'Login' : 'Sign Up';
    toggleAuth.textContent = isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Login";
    errorMessage.classList.add('hidden');
});

document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value;
    const errorMessage = document.getElementById('error-message');

    try {
        if (isLoginMode) {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('users').doc(userCredential.user.uid).get();
            
            if (userDoc.exists) {
                const userData = userDoc.data();
                portfolio.balance = userData.funbucks || 500;
                portfolio.bets = userData.bets || [];
                portfolio.history = userData.history || [{
                    date: new Date().toISOString(),
                    value: portfolio.balance
                }];
                currentUser = { 
                    ...userCredential.user, 
                    ...userData,
                    username: userData.username 
                };
                
                document.getElementById('username-display').textContent = userData.username;
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updatePortfolioDisplays();
                updateMarkets();
            }
        } else {
            if (!username) {
                throw new Error('Username is required');
            }
            
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            
            const initialData = {
                username: username,
                funbucks: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }],
                createdAt: new Date().toISOString()
            };
            
            await db.collection('users').doc(userCredential.user.uid).set(initialData);
            
            portfolio = {
                balance: initialData.funbucks,
                bets: initialData.bets,
                history: initialData.history
            };
            
            currentUser = { 
                ...userCredential.user, 
                ...initialData,
                username: username 
            };
            
            document.getElementById('username-display').textContent = username;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            updatePortfolioDisplays();
            updateMarkets();
        }
    } catch (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.remove('hidden');
    }
});

document.getElementById('logout-button').addEventListener('click', async () => {
    try {
        await auth.signOut();
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app-container').classList.add('hidden');
        document.getElementById('auth-form').reset();
        currentUser = null;
        portfolio = {
            balance: 500,
            bets: [],
            history: []
        };
    } catch (error) {
        console.error('Logout error:', error);
    }
});

document.querySelectorAll('.tab-button').forEach(button => {
    button.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('selected', 'animate__animated', 'animate__pulse');
        });
        button.classList.add('selected', 'animate__animated', 'animate__pulse');
        
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.add('hidden');
            content.classList.remove('animate__animated', 'animate__fadeIn');
        });

        const tab = document.getElementById(`${button.dataset.tab}-tab`);
        tab.classList.remove('hidden');
        tab.classList.add('animate__animated', 'animate__fadeIn');

        if (button.dataset.tab === 'home' || button.dataset.tab === 'asb' || button.dataset.tab === 'sports') {
            updateMarkets();
        } else if (button.dataset.tab === 'portfolio') {
            updatePortfolioChart();
            updatePortfolioDisplays();
        } else if (button.dataset.tab === 'leaderboard') {
            updateLeaderboard();
        }
    });
});


async function loadUserData(userId) {
    try {
        const doc = await db.collection('users').doc(userId).get();
        
        if (doc.exists) {
            const userData = doc.data();
            portfolio.balance = userData.funbucks || 500;
            portfolio.bets = userData.bets || [];
            portfolio.history = userData.history || [{
                date: new Date().toISOString(),
                value: 500
            }];
            currentUser = { ...auth.currentUser, ...userData };
            document.getElementById('username-display').textContent = userData.username;
            updatePortfolioDisplays();
        } else {
            // Initialize new user
            const initialData = {
                username: auth.currentUser.email.split('@')[0],
                funbucks: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('users').doc(userId).set(initialData);
            
            portfolio = {
                balance: initialData.funbucks,
                bets: initialData.bets,
                history: initialData.history
            };
            currentUser = { ...auth.currentUser, ...initialData };
            document.getElementById('username-display').textContent = initialData.username;
        }
    } catch (error) {
        console.error('Error loading user data:', error);
    }
}

async function updateUserData() {
    if (!auth.currentUser) return;
    
    try {
        await db.collection('users').doc(auth.currentUser.uid).set({
            username: currentUser.username,
            funbucks: portfolio.balance,
            bets: portfolio.bets,
            history: portfolio.history,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
    } catch (error) {
        console.error('Error updating user data:', error);
        throw error;
    }
}



auth.onAuthStateChanged(async (user) => {
    try {
        if (user) {
            currentUser = user;
            await loadUserData(user.uid);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            updatePortfolioDisplays();
            updateMarkets();
            const adminCheck = await isAdmin(user.uid);
            const adminButton = document.getElementById('admin-panel-btn');
            if (adminButton) {
                if (adminCheck) {
                    adminButton.classList.remove('hidden');
                    adminButton.addEventListener('click', showAdminPanel);
                } else {
                    adminButton.classList.add('hidden');
                }
            }
            const saveProfileBtn = document.getElementById('save-profile');
            const profileUsername = document.getElementById('profile-username');
            if (saveProfileBtn && profileUsername) {
                profileUsername.value = currentUser.username || '';
                saveProfileBtn.addEventListener('click', () => {
                    updateProfile(profileUsername.value);
                });
            }
        } else {
            currentUser = null;
            portfolio = {
                balance: 500,
                bets: [],
                history: [{
                    date: new Date().toISOString(),
                    value: 500
                }]
            };
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('auth-form').reset();
            document.getElementById('error-message').classList.add('hidden');
        }
    } catch (error) {
        console.error('Auth state change error:', error);
    }
});

</script>
